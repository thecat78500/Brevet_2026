<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Révision Brevet 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.app{max-width:760px;margin:0 auto;padding:16px}
.header{text-align:center;margin-bottom:20px;padding:20px;background:#fff;border-radius:16px;border:1px solid #e0e0d8}
.header h1{font-size:24px;font-weight:600;margin-bottom:6px}
.header p{font-size:14px;color:#666}
.subject-tabs{display:flex;gap:6px;margin-bottom:12px;background:#fff;border-radius:12px;padding:8px;border:1px solid #e0e0d8}
.stab{flex:1;padding:10px 8px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:#888;border-radius:8px;transition:all .2s}
.stab.active{background:#1a1a1a;color:#fff}
.stab:hover:not(.active){background:#f0f0ec;color:#1a1a1a}
.mode-btns{display:flex;gap:8px;margin-bottom:16px}
.mbtn{flex:1;padding:10px;border:1px solid #ddd;border-radius:10px;background:#fff;color:#888;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.mbtn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.mbtn:hover:not(.active){background:#f0f0ec;color:#1a1a1a}
.fiche{background:#fff;border:1px solid #e0e0d8;border-radius:12px;margin-bottom:10px;overflow:hidden}
.fiche-header{padding:14px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.fiche-header h3{font-size:15px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:8px}
.fiche-body{padding:0 16px;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .3s}
.fiche-body.open{max-height:2400px;padding:0 16px 16px}
.fiche-body p{font-size:14px;color:#333;line-height:1.7;margin-bottom:10px}
.fiche-body ul,ol{padding-left:1.4rem;margin-bottom:10px}
.fiche-body li{font-size:14px;color:#333;line-height:1.8}
.formula-box{background:#f5f5f0;border-radius:10px;padding:12px 14px;margin:10px 0;font-size:13px;color:#1a1a1a;line-height:1.9;border-left:3px solid #bbb;font-family:monospace}
.tip-box{background:#EBF4FF;border-radius:10px;padding:10px 12px;margin:10px 0;font-size:13px;color:#1a4580;border-left:3px solid #4a90d9}
.key-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;font-size:12px;font-weight:700}
.kb-blue{background:#dbeafe;color:#1e40af}
.kb-amber{background:#fef3c7;color:#92400e}
.kb-green{background:#d1fae5;color:#065f46}
.mini-table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
.mini-table th{background:#f5f5f0;padding:7px 10px;text-align:left;font-weight:600;font-size:12px;color:#666;border:1px solid #e0e0d8}
.mini-table td{padding:7px 10px;border:1px solid #e0e0d8;color:#333;vertical-align:top;line-height:1.5}
.schema-wrap{background:#f9f9f6;border:1px solid #e8e8e0;border-radius:10px;padding:12px;margin:12px 0;text-align:center}
.schema-wrap svg{max-width:100%;height:auto}
.schema-label{font-size:12px;color:#888;margin-top:6px;font-style:italic}
.progress-wrap{background:#e8e8e4;border-radius:8px;height:6px;margin-bottom:14px;overflow:hidden}
.progress-fill{height:100%;border-radius:8px;background:#1a1a1a;transition:width .3s}
.stats{display:flex;gap:8px;margin-bottom:14px}
.stat{flex:1;background:#fff;border-radius:10px;padding:10px;text-align:center;border:1px solid #e0e0d8}
.stat-n{font-size:20px;font-weight:700;color:#1a1a1a}
.stat-l{font-size:11px;color:#888;margin-top:2px}
.question-card{background:#fff;border:1px solid #e0e0d8;border-radius:12px;padding:18px;margin-bottom:12px}
.q-meta{display:flex;justify-content:space-between;margin-bottom:10px}
.q-num-label{font-size:12px;color:#888;font-weight:600}
.q-text{font-size:15px;color:#1a1a1a;line-height:1.65;margin-bottom:14px;font-weight:500}
.q-hint{font-size:13px;color:#1a4580;margin-bottom:12px;font-style:italic;padding:8px 12px;background:#EBF4FF;border-radius:8px}
.options{display:flex;flex-direction:column;gap:8px}
.option{padding:11px 14px;border:1px solid #ddd;border-radius:10px;cursor:pointer;font-size:14px;color:#333;background:#fff;text-align:left;transition:all .15s;font-family:inherit}
.option:hover:not(:disabled){background:#f5f5f0;border-color:#bbb}
.option.correct{background:#d1fae5;border-color:#059669;color:#064e3b;font-weight:600}
.option.wrong{background:#fee2e2;border-color:#dc2626;color:#7f1d1d}
.option:disabled{cursor:default}
.feedback{margin-top:12px;padding:12px;border-radius:10px;font-size:14px;line-height:1.6}
.feedback.correct{background:#d1fae5;color:#064e3b;border:1px solid #059669}
.feedback.wrong{background:#fee2e2;color:#7f1d1d;border:1px solid #dc2626}
.nav{display:flex;gap:8px;margin-top:12px;align-items:center;justify-content:space-between}
.btn{padding:10px 18px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer;font-weight:600;font-family:inherit;transition:all .15s}
.btn:hover:not(:disabled){background:#f5f5f0}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover:not(:disabled){background:#333}
.btn:disabled{opacity:.35;cursor:default}
.btn-full{width:100%;margin-top:10px;padding:12px}
.final{text-align:center;padding:2.5rem 1rem;background:#fff;border-radius:12px;border:1px solid #e0e0d8}
.final-score{font-size:52px;font-weight:700;color:#1a1a1a;margin:12px 0}
.final-msg{font-size:15px;color:#666;margin-bottom:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:260px;margin:0 auto 20px}
.chevron{font-size:11px;color:#999;transition:transform .2s;display:inline-block}
.chevron.open{transform:rotate(180deg)}
.section-title{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.08em;margin:0 0 10px}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;margin-right:6px;margin-bottom:4px}
@media(max-width:500px){
  .subject-tabs{flex-direction:column}
  .stats{flex-wrap:wrap}
  .stat{min-width:calc(50% - 4px)}
  .final-score{font-size:40px}
  .nav .btn{padding:10px 12px;font-size:13px}
}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <h1>📚 Révision Brevet 2026</h1>
  <p>Fiches de cours avec schémas + 30 exercices par matière</p>
</div>
<div class="subject-tabs" id="stabs">
  <button class="stab active" onclick="switchSubject(0)">📐 Mathématiques</button>
  <button class="stab" onclick="switchSubject(1)">🗺️ Histoire-Géo & EMC</button>
  <button class="stab" onclick="switchSubject(2)">🔬 Sciences</button>
</div>
<div class="mode-btns">
  <button class="mbtn active" id="mb0" onclick="switchMode('fiches')">📖 Fiches de révision</button>
  <button class="mbtn" id="mb1" onclick="switchMode('exos')">✏️ Exercices (30 questions)</button>
</div>
<div id="main-area"></div>
</div>

let curSubj=0,curMode='fiches',curQ=0;
let answered={},scores={0:{done:0,good:0},1:{done:0,good:0},2:{done:0,good:0}};
let ficheOpen={};
const COLORS=['kb-blue','kb-amber','kb-green'];
const LABELS=['Mathématiques','Histoire-Géo & EMC','Sciences'];

function switchSubject(s){curSubj=s;curQ=0;document.querySelectorAll('.stab').forEach((el,i)=>el.classList.toggle('active',i===s));render();}
function switchMode(m){curMode=m;document.getElementById('mb0').classList.toggle('active',m==='fiches');document.getElementById('mb1').classList.toggle('active',m==='exos');curQ=0;render();}
function render(){curMode==='fiches'?renderFiches():renderExos();}

function renderFiches(){
  const fiches=FICHES[curSubj];
  let html=`<div class="section-title">${LABELS[curSubj]} — ${fiches.length} fiches de cours</div>`;
  fiches.forEach((f,i)=>{
    const key=curSubj+'_'+i,isOpen=ficheOpen[key];
    html+=`<div class="fiche"><div class="fiche-header" onclick="toggleFiche('${key}')"><h3><span class="tag ${COLORS[curSubj]}">${i+1}</span>${f.title}</h3><span class="chevron${isOpen?' open':''}">▼</span></div><div class="fiche-body${isOpen?' open':''}">${f.content}</div></div>`;
  });
  html+=`<button class="btn btn-primary btn-full" onclick="switchMode('exos')">Passer aux exercices →</button>`;
  document.getElementById('main-area').innerHTML=html;
}

function toggleFiche(key){ficheOpen[key]=!ficheOpen[key];renderFiches();}

function renderExos(){
  const qs=QUESTIONS[curSubj],s=scores[curSubj];
  const N=qs.length;
  if(s.done===N){
    const pct=Math.round(s.good/N*100);
    const msg=pct>=80?'Excellent ! Tu es prêt(e) pour le brevet !':pct>=60?'Bien ! Revois tes erreurs pour progresser.':'Continue à réviser, tu vas y arriver !';
    const emoji=pct>=80?'🎉':pct>=60?'👍':'💪';
    document.getElementById('main-area').innerHTML=`<div class="final"><div style="font-size:48px">${emoji}</div><div class="final-score">${s.good}/${N}</div><div class="final-msg">${msg} (${pct}%)</div><div class="grid2"><div class="stat"><div class="stat-n" style="color:#059669">${s.good}</div><div class="stat-l">✓ Correctes</div></div><div class="stat"><div class="stat-n" style="color:#dc2626">${N-s.good}</div><div class="stat-l">✗ Erreurs</div></div></div><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><button class="btn" onclick="resetExos()">🔄 Recommencer</button><button class="btn btn-primary" onclick="switchMode('fiches')">📖 Revoir les fiches</button></div></div>`;
    return;
  }
  const pct=Math.round(s.done/N*100),q=qs[curQ],key=curSubj+'_'+curQ,isAns=answered[key]!==undefined;
  let optsHtml=q.opts.map((o,i)=>{let cls='option';if(isAns){if(i===q.ans)cls+=' correct';else if(i===answered[key]&&i!==q.ans)cls+=' wrong';}return`<button class="${cls}"${isAns?' disabled':''} onclick="doAnswer(${i})">${String.fromCharCode(65+i)}. ${o}</button>`;}).join('');
  const fb=isAns?`<div class="feedback ${answered[key]===q.ans?'correct':'wrong'}"><strong>${answered[key]===q.ans?'✓ Bonne réponse !':'✗ Mauvaise réponse.'}</strong> ${q.exp}</div>`:'';
  document.getElementById('main-area').innerHTML=`<div class="stats"><div class="stat"><div class="stat-n">${s.done}</div><div class="stat-l">Répondues</div></div><div class="stat"><div class="stat-n" style="color:#059669">${s.good}</div><div class="stat-l">Correctes</div></div><div class="stat"><div class="stat-n">${s.done?Math.round(s.good/s.done*100):0}%</div><div class="stat-l">Score</div></div><div class="stat"><div class="stat-n">${N-s.done}</div><div class="stat-l">Restantes</div></div></div><div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div><div class="question-card"><div class="q-meta"><span class="q-num-label">Question ${curQ+1} / ${N}</span><span class="tag ${COLORS[curSubj]}" style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px">${LABELS[curSubj]}</span></div><div class="q-text">${q.q}</div>${q.hint?`<div class="q-hint">💡 ${q.hint}</div>`:''}<div class="options">${optsHtml}</div>${fb}</div><div class="nav"><button class="btn" onclick="prevQ()"${curQ===0?' disabled':''}>← Précédente</button><span style="font-size:13px;color:#888;font-weight:600">${curQ+1} / ${N}</span><button class="btn btn-primary" onclick="nextQ()">Suivante →</button></div>`;
}

function doAnswer(i){const key=curSubj+'_'+curQ;if(answered[key]!==undefined)return;answered[key]=i;scores[curSubj].done++;if(i===QUESTIONS[curSubj][curQ].ans)scores[curSubj].good++;renderExos();}
function nextQ(){const qs=QUESTIONS[curSubj];if(curQ<qs.length-1){curQ++;}else{const n=qs.findIndex((_,i)=>answered[curSubj+'_'+i]===undefined);if(n!==-1)curQ=n;}renderExos();}
function prevQ(){if(curQ>0){curQ--;renderExos();}}
function resetExos(){const n=QUESTIONS[curSubj].length;for(let i=0;i<n;i++)delete answered[curSubj+'_'+i];scores[curSubj]={done:0,good:0};curQ=0;renderExos();}

render();
</script>
</body>
</html>
